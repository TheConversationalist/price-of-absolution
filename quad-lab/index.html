<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quad lab — video texture</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        overflow: hidden;
        background: #0a0f14;
        font-family: system-ui, sans-serif;
      }
      #hint {
        position: fixed;
        left: 12px;
        top: 12px;
        color: #9db4c9;
        font-size: 13px;
        line-height: 1.45;
        max-width: 320px;
        pointer-events: none;
        text-shadow: 0 1px 2px #000;
      }
      canvas {
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="hint">
      Drag the orange squares (TL → TR → BR → BL).<br />
      <strong>[</strong> / <strong>]</strong> grid density (smoother warp) · <strong>R</strong> reset corners ·
      click / drag / key once to <strong>unmute</strong>.
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
